<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Sidebar</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Poppins", sans-serif;
}

body{
background:#110e1c;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
height:100vh;
width:80px;
background:#000000;
padding-top:25px;
transition:0.4s;
overflow:hidden;
border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar.active{
width:240px;
}

/* LOGO */

.logo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:40px;
}

.logo img{
width:45px;
margin-bottom:8px;
}

.logoText{
font-size:18px;
color:white;
opacity:0;
transition:0.3s;
}

.sidebar.active .logoText{
opacity:1;
}

/* MENU */

.menu{
list-style:none;
padding:0 10px;
}

.menu a{
text-decoration:none;
}

.menu li{
display:flex;
align-items:center;
gap:15px;
color:#94a3b8;
padding:14px;
margin:10px 0;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.menu li i{
font-size:20px;
min-width:40px;
text-align:center;
}

.menu li span{
opacity:0;
white-space:nowrap;
transition:0.3s;
}

.sidebar.active li span{
opacity:1;
}

/* ACTIVE */

.menu li.active{
background:linear-gradient(90deg,#1d4ed8,#0ea5e9);
color:white;
}

/* HOVER */

.menu li:hover{
background:#0f172a;
color:white;
}

/* BOTTOM BUTTON */

.bottomButton{
position:absolute;
bottom:25px;
left:10px;
right:10px;
}

.bottomButton li{
background:linear-gradient(90deg,#1d4ed8,#0ea5e9);
color:white;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
bottom:0;
top:auto;
height:70px;
width:100%;
display:flex;
align-items:center;
justify-content:center;
border-right:none;
border-top:1px solid rgba(255,255,255,0.08);
}

.menu{
display:flex;
width:100%;
justify-content:space-around;
}

.menu li{
flex-direction:column;
gap:4px;
margin:0;
padding:5px;
border-radius:20px;
}

.menu li span{
display:none;
}

.logo{
display:none;
}

.bottomButton{
display:flex;
position:static;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="logo">
<img src="logo.webp">
<h3 class="logoText">Stackly</h3>
</div>


<ul class="menu">

<a href="home.html">
<li>
<i class="fa-solid fa-house"></i>
<span>HOME ONE</span>
</li>
</a>

<a href="home2.html">
<li>
<i class="fa-solid fa-home"></i>
<span>HOME TWO</span>
</li>
</a>

<a href="reel.html">
<li>
<i class="fa-solid fa-clapperboard"></i>
<span>REELS</span>
</li>
</a>

<a href="create.html">
<li class="active">
<i class="fa-solid fa-plus"></i>
<span>CREATE</span>
</li>
</a>

<a href="explore.html">
<li>
<i class="fa-solid fa-football"></i>
<span>EXPLORE</span>
</li>
</a>

<a href="messages.html">
<li>
<i class="fa-solid fa-message"></i>
<span>MESSAGES</span>
</li>
</a>


</a>

</ul>


<ul class="menu bottomButton">

<a href="myspace.html">
<li>
<i class="fa-solid fa-circle-user"></i>
<span>My Spaces</span>
</li>
</a>

</ul>

</div>



<script>

const sidebar = document.getElementById("sidebar");

sidebar.addEventListener("click", function(){

if(window.innerWidth > 768){

sidebar.classList.toggle("active");

}

});

</script>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Post</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0a0a0a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}


/* MAIN BOX */

.createContainer{
width:700px;
max-width:95%;
height:500px;
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
display:flex;
flex-direction:column;
}


/* HEADER */

.createHeader{
display:flex;
justify-content:center;
align-items:center;
height:60px;
border-bottom:1px solid #333;
font-weight:500;
}


/* UPLOAD AREA */

.uploadArea{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
border:2px dashed #444;
margin:20px;
border-radius:10px;
transition:0.3s;
text-align:center;
}

.uploadArea.dragover{
border-color:#5865f2;
background:#111;
}

.uploadArea i{
font-size:60px;
}

.selectBtn{
background:#5865f2;
border:none;
padding:10px 20px;
border-radius:6px;
color:white;
cursor:pointer;
}

.preview{
width:100%;
height:100%;
object-fit:cover;
}


/* MOBILE */

@media(max-width:600px){

.createContainer{
width:100%;
height:100%;
border-radius:0;
}

}

</style>
</head>


<body>


<div class="createContainer">

<div class="createHeader">
Create new post
</div>


<div class="uploadArea" id="uploadArea">

<i class="fa-regular fa-images"></i>

<p>Drag photos and videos here</p>

<button class="selectBtn">Select from computer</button>

<input type="file" id="fileInput" hidden>

</div>


</div>



<script>

let uploadArea=document.getElementById("uploadArea");
let fileInput=document.getElementById("fileInput");
let selectBtn=document.querySelector(".selectBtn");


selectBtn.onclick=()=>{
fileInput.click();
}


fileInput.addEventListener("change",function(){

let file=this.files[0];

previewFile(file);

});


uploadArea.addEventListener("dragover",(e)=>{
e.preventDefault();
uploadArea.classList.add("dragover");
});


uploadArea.addEventListener("dragleave",()=>{
uploadArea.classList.remove("dragover");
});


uploadArea.addEventListener("drop",(e)=>{
e.preventDefault();

uploadArea.classList.remove("dragover");

let file=e.dataTransfer.files[0];

previewFile(file);

});


function previewFile(file){

let reader=new FileReader();

reader.onload=function(){

if(file.type.startsWith("image")){

uploadArea.innerHTML=
`<img src="${reader.result}" class="preview">`;

}

else if(file.type.startsWith("video")){

uploadArea.innerHTML=
`<video src="${reader.result}" controls class="preview"></video>`;

}

}

reader.readAsDataURL(file);

}

</script>


</body>
</html>
