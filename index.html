<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#020b1f;
color:white;
flex-direction:column;
transition:opacity 0.8s ease;
}

/* Spinner */

.loader{
width:60px;
height:60px;
border:6px solid rgba(255,255,255,0.2);
border-top:6px solid #4da6ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:30px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* Progress Bar */

.progressContainer{
width:220px;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#1e90ff,#6dd5ff);
animation:loading 2s linear forwards;
}

@keyframes loading{
0%{width:0%;}
100%{width:100%;}
}

.loadingText{
color:#9fb6d6;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="loader"></div>

</div>

<p class="loadingText">Loading My Space...</p>

<script>

/* Fade + Redirect */

setTimeout(function(){
document.body.style.opacity="0";
},1800);

setTimeout(function(){
window.location.href="home.html";
},2600);

</script>

</body>
</html>
